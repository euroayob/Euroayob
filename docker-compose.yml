version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: job_hunter_db
    environment:
      POSTGRES_USER: job_hunter
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: job_hunter_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_hunter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job_hunter_network

  redis:
    image: redis:7-alpine
    container_name: job_hunter_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job_hunter_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_hunter_api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://job_hunter:secure_password_123@postgres:5432/job_hunter_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_change_in_production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - job_hunter_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: job_hunter_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - job_hunter_network

volumes:
  postgres_data:

networks:
  job_hunter_network:
    driver: bridge
